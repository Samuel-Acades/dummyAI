version: '3.8'

services:
  kobiri-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kobiri-ai-service
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=8001
      - CHROMA_DB_PATH=/code/chroma_db
      - DATA_DIR=/code/data
      - SENTENCE_TRANSFORMERS_HOME=/code/.cache/sentence_transformers
      - TRANSFORMERS_CACHE=/code/.cache/transformers
      - HF_HOME=/code/.cache/huggingface
    volumes:
      - ./chroma_db:/code/chroma_db
      - ./data:/code/data
      - ./hf_cache:/code/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
