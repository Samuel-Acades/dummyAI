version: '3.8'

services:
  kobiri-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kobiri-ai-service
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./chroma_db:/code/chroma_db
      - ./data:/code/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
